<!DOCTYPE html>
<html>
<head>
    <title>Wedding Seating</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Find Your Table</h1>

        <input id="firstName" placeholder="First Name">
        <input id="lastName" placeholder="Last Name">

        <button onclick="findGuest()">Search</button>

        <div id="result"></div>
    </div>

    <script src="guests.js"></script>

    <script>
        function findGuest() {
            const first = document
                .getElementById("firstName")
                .value
                .trim()
                .toLowerCase();

            const last = document
                .getElementById("lastName")
                .value
                .trim()
                .toLowerCase();

            const guest = guests.find(g =>
                g.firstName.toLowerCase() === first &&
                g.lastName.toLowerCase() === last
            );

            const result = document.getElementById("result");

            if (guest) {
                result.innerHTML =
                  `Hello ${guest.firstName} ${guest.lastName}, you're in table ${guest.table}.`;
            } else {
                result.innerHTML =
                  "Sorry, we couldn't find your reservation.";
            }
        }
    </script>
</body>
</html>
